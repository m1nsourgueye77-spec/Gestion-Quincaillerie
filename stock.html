<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock - Ali Quincailler</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>📦 Gestion du Stock</h1>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="stock.html">Stock</a>
    <a href="clients.html">Clients</a>
    <a href="fournisseurs.html">Fournisseurs</a>
  </nav>
</header>

<section class="form-section">
  <h2>Ajouter un produit</h2>

  <input type="text" id="prodName" placeholder="Nom produit">
  <input type="number" id="prodQty" placeholder="Quantité">
  <input type="number" id="prodPrice" placeholder="Prix">

  <button onclick="addProduct()">Ajouter</button>
</section>

<section class="list-section">
  <h2>Liste du stock</h2>
  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Produit</th>
        <th>Quantité</th>
        <th>Prix</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="stockTable"></tbody>
  </table>
</section>

<script src="js/app.js"></script>
</body>
</html>
